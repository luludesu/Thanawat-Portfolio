<style>

body {
  background:black;

  .name{
    font-family: 'Silkscreen', sans-serif;

.text{

h1{

  font-size: 60px;
  text-shadow: 0 0 8px #9E76B4;

}

p{
    color: #cfcfcf;
    font-size: 20px;

}

button{
    background-color: cyan;
    color: black;

    padding: 10px 20px;

    border: none;

    border-radius: 5px;

    font-size: 18px;

    cursor: pointer;

    box-shadow: 0 0 20px cyan;

}

button:hover {
        background: white;
    }

img {
    border-radius: 50%;
    box-shadow: 0 0 20px white;
}

img{
    transition: transform 0.3s ease;
}

img:hover {
    transform: scale(1.1);
}

#stars {
    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    z-index: -1;
}

.star {
    position: absolute;

    width: 2px;
    height: 2px;

    background: white;

    border-radius: 50%;

    animation: drift 20s linear infinite;

    box-shadow: 0 0 5px white;
}

@keyframes drift {
    from {
        transform: translateX(-50px);
    }
    to {
        transform: translateX(100vw);
    }
}

.card {
    background-color: #1a1a1a;

    width: 500px;

    height: 965px;

    margin: 50px auto;

    padding: 30px;

    border-radius: 20px;

    box-shadow: 0 0 20px #1a1a1a;

    transition: transform 0.3s ease;

    backdrop-filter: blur(10px);
}

.card:hover {
    transform:translateY(-10px);

    border: 2px solid #9E76B4;

    box-shadow: 0 0 30px #9E76B4;
}

.badge {

    display: inline-block;

    padding: 12px 24px;

    border:#57C48D solid 2px;

    border-radius: 12px;

    color: #57C48D;

    text-decoration: none;

    font-family:monospace;

    text-shadow: 0 0 10px #57C48D;

    box-shadow: 0 0 20px #57C48D;

    transition:0.3s;

}

.project-button{

    position: absolute;
    left: 20px;
    top: 230px;

    display:flex;
    justify-content:center;
    align-items:center;

    width:10px;
    height:180px;

    overflow:hidden;

    border:2px solid #57C48D;
    border-radius:18px;

    color:#57C48D;
    text-decoration:none;
}

.badge:hover {

    transform: translateX(12px);
    box-shadow: 
        0 0 15px #57C48D,
        0 0 035px rgba(87,196,141,0.9);

    background: rgba(87,196,141,0.8);
    color: black;

}

.highlight {
    color: #7fffd4;
    font-weight: bold;
}

.project-text{

    display: inline-block;
    transform: rotate(-90deg);
    white-space: nowrap;
    letter-spacing: 3px;
    transition: 0.3s ease;
}

.project-button:hover .project-text{
    transform: rotate(-90deg) translateX(5px);
}

</style>

<script>

const stars = document.getElementById('stars');

for(let i = 0; i < 300; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = (Math.random() * 20 + 10 ) + 's';
    stars.appendChild(star);

    const size = Math.random() * 3 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.opacity = Math.random();

}
